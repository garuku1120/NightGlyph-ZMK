# 乾電池使用のため電圧監視を無効化
CONFIG_ZMK_BATTERY_REPORTING=n

# ★テスト用: 新ZMK(main)で復帰するか確認のため一時的にスリープON(2分)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=120000

# デバッグ用 USB ログ（split接続の診断中。終わったら n に戻す）
CONFIG_ZMK_USB_LOGGING=n

# ZMK Studio（ブラウザカスタム機能）を有効化
CONFIG_ZMK_STUDIO=y

# ロック機能を無効化（解除キー不要で常に編集可能）
CONFIG_ZMK_STUDIO_LOCKING=n