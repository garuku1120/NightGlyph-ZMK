# 乾電池使用のため電圧監視を無効化
CONFIG_ZMK_BATTERY_REPORTING=n

# ★ディープスリープ無効化（復帰不良の切り分け＆回避。System OFFに入らないので固まらない）
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=120000

# デバッグ用 USB ログ（split接続の診断中。終わったら n に戻す/消す）
CONFIG_ZMK_USB_LOGGING=n

# 分割キーボードの右側（ペリフェラル/子機）として動作させる設定
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# 右側（子機）ではZMK Studioを強制的に無効化する
CONFIG_ZMK_STUDIO=n